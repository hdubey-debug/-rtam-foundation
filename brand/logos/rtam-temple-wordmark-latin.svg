<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" role="img" aria-labelledby="rtam-temple-wordmark-latin-title rtam-temple-wordmark-latin-desc">
  <title id="rtam-temple-wordmark-latin-title">Rtambhareshvara Temple — Latin wordmark</title>
  <desc id="rtam-temple-wordmark-latin-desc">Stacked Latin wordmark for the temple: the name Rtambhareshvara (Cinzel, leading R carrying the gold bindu = the vocalic-ṛ crest) over the descriptor Temple. Charcoal text, gold bindu on transparent ground.</desc>
  <defs>
    <style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&amp;display=swap');</style>
  </defs>
  <text x="540" y="120" font-family="Cinzel, Marcellus, 'Trajan Pro', serif" font-weight="500" font-size="66" letter-spacing="4" text-anchor="middle" fill="#1A1A1A">Rtambhareshvara</text>
  <text x="540" y="186" font-family="Cinzel, Marcellus, 'Trajan Pro', serif" font-weight="400" font-size="30" letter-spacing="14" text-anchor="middle" fill="#1A1A1A">Temple</text>
  <circle cx="217.8" cy="135.4" r="5.5" fill="#C8A15A"/>
</svg>
