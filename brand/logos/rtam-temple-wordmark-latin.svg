<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" role="img" aria-label="Rtambhareshvara Temple">
  <title>Rtambhareshvara Temple — Latin wordmark</title>
  <desc>Stacked Latin wordmark for the temple: the name Rtambhareshvara (Cinzel, leading R carrying the gold bindu = the vocalic-ṛ crest) over the descriptor Temple. Charcoal text, gold bindu on transparent ground.</desc>
  <defs>
    <style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&amp;display=swap');</style>
  </defs>
  <g font-family="Cinzel, Marcellus, 'Trajan Pro', serif" fill="#1A1A1A" text-anchor="middle">
    <text x="540" y="120" font-size="66" font-weight="500" letter-spacing="4">Rtambhareshvara</text>
    <text x="540" y="186" font-size="30" font-weight="400" letter-spacing="14">Temple</text>
  </g>
  <circle cx="217.8" cy="135.4" r="5.5" fill="#C8A15A"/>
</svg>
