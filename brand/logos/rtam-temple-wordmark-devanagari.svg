<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 280" role="img" aria-label="ऋतम्भरेश्वर मंदिर">
  <title>Rtambhareshvara Mandir — Devanagari wordmark</title>
  <desc>Stacked Devanagari wordmark for the temple: ऋतम्भरेश्वर over मंदिर (Tiro Devanagari Sanskrit). No bindu — ऋ is the self-contained vocalic-R. Charcoal on transparent.</desc>
  <defs>
    <style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&amp;display=swap');</style>
  </defs>
  <text x="540" y="130" font-family="'Tiro Devanagari Sanskrit', 'Noto Serif Devanagari', serif" font-size="76" text-anchor="middle" fill="#1A1A1A">ऋतम्भरेश्वर</text>
  <text x="540" y="210" font-family="'Tiro Devanagari Sanskrit', 'Noto Serif Devanagari', serif" font-size="40" text-anchor="middle" fill="#1A1A1A">मंदिर</text>
</svg>
