<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" role="img" aria-label="Ṛtambhareśvara Mandir">
  <title>Ṛtambhareśvara Mandir — diacritic wordmark (pronunciation form)</title>
  <desc>Mixed-diacritic pronunciation form: the leading R + gold bindu reads as Ṛ (vocalic-ṛ), the native Cinzel ś carries the palatal sibilant. Descriptor Mandir. The scholarly/sacred Latin register.</desc>
  <defs>
    <style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&amp;display=swap');</style>
  </defs>
  <text x="540" y="120" font-family="Cinzel, Marcellus, 'Trajan Pro', serif" font-weight="500" font-size="66" letter-spacing="4" text-anchor="middle" fill="#1A1A1A">Rtambhareśvara</text>
  <text x="540" y="186" font-family="Cinzel, Marcellus, 'Trajan Pro', serif" font-weight="400" font-size="30" letter-spacing="14" text-anchor="middle" fill="#1A1A1A">Mandir</text>
  <circle cx="244.2" cy="135.4" r="5.5" fill="#C8A15A"/>
</svg>
