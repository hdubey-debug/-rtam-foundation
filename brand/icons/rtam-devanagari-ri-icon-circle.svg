<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="rtam-devanagari-ri-icon-circle-title rtam-devanagari-ri-icon-circle-desc">
  <title id="rtam-devanagari-ri-icon-circle-title">Devanagari ऋ in circle — charcoal glyph, gold ring</title>
  <desc id="rtam-devanagari-ri-icon-circle-desc">Enclosed seal variant: charcoal ऋ inside a gold ring. The Devanagari counterpart to the Latin circle-gold seal. Use as a sacred avatar, social profile mark, or stamped seal.</desc>
  <defs>
    <style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&amp;display=swap');</style>
  </defs>
  <text x="128" y="190" font-family="'Tiro Devanagari Sanskrit', 'Noto Serif Devanagari', serif" font-size="184" text-anchor="middle" fill="#1A1A1A">ऋ</text>
  <circle cx="128" cy="128" r="118" fill="none" stroke="#C8A15A" stroke-width="5"/>
</svg>
