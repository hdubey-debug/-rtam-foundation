  <text x="128" y="178" font-family="Cinzel, Marcellus, 'Trajan Pro', serif" font-weight="600" font-size="170" text-anchor="middle" fill="#1A1A1A">R</text>
  <circle cx="131" cy="207" r="11" fill="#1A1A1A"/>
</svg>
