<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-label="ṚTAM Foundation — 12-medallion seal pattern">
  <title>Seal pattern — tileable field of 12-medallion seals</title>
  <desc>Repeating field of the 12-medallion seal at reduced scale, intended for letterhead borders, endpapers, certificate backgrounds, and donation envelopes. Tile size 240×240, three tiles across the 720 viewBox. The pattern is deliberately quiet — the seal repeats but does not crowd; whitespace dominates so the primary wordmark always wins.</desc>
  <defs>
    <pattern id="medallion-tile" x="0" y="0" width="240" height="240" patternUnits="userSpaceOnUse">
      <!-- One seal motif per tile, centered at 120,120 -->
      <circle cx="120" cy="120" r="90" fill="none" stroke="#C8A15A" stroke-width="1.25" opacity="0.55"/>
      <g fill="#C8A15A" opacity="0.65">
        <circle cx="120" cy="30" r="4.5" transform="rotate(0 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(30 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(60 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(90 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(120 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(150 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(180 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(210 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(240 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(270 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(300 120 120)"/>
        <circle cx="120" cy="30" r="4.5" transform="rotate(330 120 120)"/>
      </g>
      <circle cx="120" cy="120" r="5.5" fill="#C8A15A" opacity="0.7"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="720" height="720" fill="url(#medallion-tile)"/>
</svg>
