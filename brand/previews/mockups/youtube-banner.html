<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mockup — RTAM Foundation YouTube banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Tiro+Devanagari+Sanskrit&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../palette/colors.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0e0d20; }
    .banner {
      width: 2560px;
      height: 1440px;
      background: var(--rtam-indigo);
      color: var(--rtam-ivory);
      position: relative;
      overflow: hidden;
    }
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(200,161,90,0.12), transparent 60%);
    }
    .safe-area {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1546px;
      height: 423px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2;
    }
    .safe-area svg { width: 880px; height: auto; display: block; }
    .safe-area .deva {
      margin-top: 28px;
      font-family: 'Tiro Devanagari Sanskrit', serif;
      font-size: 44px;
      color: var(--rtam-ivory);
    }
    .safe-area .tagline {
      margin-top: 18px;
      font-family: Inter, sans-serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--rtam-gold);
    }
    .safe-outline {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1546px;
      height: 423px;
      border: 1px dashed rgba(247,243,233,0.18);
      pointer-events: none;
      z-index: 1;
    }
    .safe-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: calc(50% + 211px + 18px);
      font-family: Inter, sans-serif;
      font-size: 14px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(247,243,233,0.30);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="safe-outline"></div>
    <div class="safe-label">YouTube mobile-safe area · 1546 × 423</div>
    <div class="safe-area">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 240">
        <g font-family="Cinzel, serif">
          <text x="80" y="160" font-size="120" font-weight="500" letter-spacing="12" fill="#F7F3E9">RTAM</text>
          <text x="540" y="160" font-size="62" font-weight="400" letter-spacing="8" fill="#F7F3E9">Foundation</text>
        </g>
        <circle cx="118" cy="188" r="10" fill="#C8A15A"/>
      </svg>
      <div class="deva">ऋतम् फाउंडेशन</div>
      <div class="tagline">Order, returning.</div>
    </div>
  </div>
</body>
</html>
