<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 380" role="img" aria-labelledby="rtam-sanskritic-pratishthan-title rtam-sanskritic-pratishthan-desc">
  <title id="rtam-sanskritic-pratishthan-title">Bilingual lockup — ṚTAM Foundation / ऋतम् प्रतिष्ठान (pure Sanskritic register)</title>
  <desc id="rtam-sanskritic-pratishthan-desc">Stacked bilingual lockup using the pure Sanskritic Devanagari form प्रतिष्ठान (pratiṣṭhāna — "established institution"), rather than the borrowed फाउंडेशन. For scholarly, sacred, or trust-deed contexts where the higher register is preferred.</desc>
  <defs>
    <style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&amp;family=Tiro+Devanagari+Sanskrit&amp;display=swap');</style>
  </defs>
  <text x="80" y="160" font-family="Cinzel, Marcellus, 'Trajan Pro', serif" font-weight="500" font-size="120" letter-spacing="12" fill="#1A1A1A">RTAM</text>
  <text x="540" y="160" font-family="Cinzel, Marcellus, 'Trajan Pro', serif" font-weight="400" font-size="62" letter-spacing="8" fill="#1A1A1A">Foundation</text>
  <text x="540" y="335" font-family="'Tiro Devanagari Sanskrit', 'Noto Serif Devanagari', serif" font-size="60" text-anchor="middle" fill="#1A1A1A">ऋतम् प्रतिष्ठान</text>
  <circle cx="126.5" cy="188" r="10" fill="#C8A15A"/>
  <line x1="420" y1="245" x2="660" y2="245" stroke="#C8A15A" stroke-width="1.5"/>
</svg>
